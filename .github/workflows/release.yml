name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Package
        run: |
          mkdir -p staging/WaydroidToolbox/dist
          cp plugin.json main.py package.json staging/WaydroidToolbox/
          cp dist/index.js staging/WaydroidToolbox/dist/
          cd staging
          zip -r ../WaydroidToolbox.zip WaydroidToolbox/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            WaydroidToolbox.zip
            install.sh
          generate_release_notes: true
